name: Build APK
on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'

      - name: Create Flutter template for resources
        run: |
          flutter create --org com.example --project-name temp_res /tmp/tempapp
          cp -r /tmp/tempapp/android/app/src/main/res android/app/src/main/
          cp -r /tmp/tempapp/android/app/src/main/kotlin android/app/src/main/
          cp /tmp/tempapp/android/app/build.gradle android/app/build.gradle
          cp /tmp/tempapp/android/build.gradle android/build.gradle
          cp /tmp/tempapp/android/settings.gradle android/settings.gradle
          cp /tmp/tempapp/android/gradle.properties android/gradle.properties
          cp -r /tmp/tempapp/android/gradle android/
          cp /tmp/tempapp/android/gradlew android/
          cp /tmp/tempapp/android/gradlew.bat android/
          sed -i 's/temp_res/med_flashcards/g' android/app/build.gradle
          sed -i 's/temp_res/med_flashcards/g' android/app/src/main/AndroidManifest.xml
          mv android/app/src/main/kotlin/com/example/temp_res android/app/src/main/kotlin/com/example/med_flashcards
          sed -i 's/temp_res/med_flashcards/g' android/app/src/main/kotlin/com/example/med_flashcards/MainActivity.kt

      - name: Get dependencies
        run: flutter pub get

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' ' | cut -d'+' -f1)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build APK
        run: flutter build apk --release

      - name: Delete old release
        run: |
          gh release delete "v${{ steps.version.outputs.VERSION }}" --yes 2>/dev/null || true
          git push --delete origin "v${{ steps.version.outputs.VERSION }}" 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Version ${{ steps.version.outputs.VERSION }}
          body: ${{ github.event.head_commit.message }}
          files: build/app/outputs/flutter-apk/app-release.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
